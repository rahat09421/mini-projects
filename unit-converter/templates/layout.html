<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit Converter</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { border: 2px solid #000; border-radius: 10px; padding: 20px; width: 350px; min-height: 450px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #000; font-weight: bold; }
        .active { color: #4a90e2; border-bottom: 2px solid #4a90e2; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 2px solid #000; border-radius: 5px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 25px; background: white; border: 2px solid #000; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .result-text { font-size: 24px; margin: 30px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Unit Converter</h2>
        <nav>
            <a href="/length" class="{{ 'active' if request.path == '/length' }}">Length</a>
            <a href="/weight" class="{{ 'active' if request.path == '/weight' }}">Weight</a>
            <a href="/temperature" class="{{ 'active' if request.path == '/temperature' }}">Temperature</a>
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
